{{ define "main" }}
<div class="w-1/3 ml-5">
  <div class="bg-white p-10 rounded-md">
    {{ range .Pages }}
      {{ $currentPage := .}}
      <div class="">
        <span class="text-xl">{{.Title}} {{ with .Params.www }}<a class="text-sm text-gray-700 hover:text-gray-900" target="_blank" href="{{.}}"><i class="fas fa-link"></i></a>{{end}}</span>
      </div>
    {{ end }}
  </div>
</div>
{{ end }}
